trigger:
- none

pool:
  vmImage: ubuntu-latest

stages:
- stage: deploy_stage
  displayName: terraform stage
  jobs:
  - job: deploy_job
    displayName: terraform job
    steps:
    # Explicit checkout ensures working directories resolve properly
    - checkout: self 
    
    - task: TerraformInstaller@1
      displayName: terraform install
      inputs:
        terraformVersion: '1.15.7'

    - script: |
        terraform version
      displayName: Verify Terraform

    - task: TerraformTaskV4@4
      displayName: terraform init
      inputs:
        provider: 'aws'
        command: 'init'
        #  FIX: Point to the repository folder or use the relative path directly
        workingDirectory: '$(Build.SourcesDirectory)/pipelines/aws'
        backendServiceAWS: 'adoaws'
        backendAWSBucketName: 'terraform'
        backendAWSKey: 'terraform.tfstate'
    - task: TerraformTask@5
      displayName: terraform Plan
      inputs:
        provider: 'aws'
        command: 'plan'
        workingDirectory: '$(Build.SourcesDirectory)/pipelines/aws'
        environmentServiceNameAWS: 'adoaws'
    - task: TerraformTaskV4@4
      displayName: terraform apply
      inputs:
        provider: 'aws'
        command: 'apply'
        #FIX: Match the init working directory path
        workingDirectory: '$(Build.SourcesDirectory)/pipelines/aws'
        environmentServiceNameAWS: 'adoaws'
    
    #- task: TerraformTaskV4@4
